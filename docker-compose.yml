version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jambotails
      POSTGRES_PASSWORD: jambotails_secret
      POSTGRES_DB: shipping_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jambotails -d shipping_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://jambotails:jambotails_secret@postgres:5432/shipping_db?sslmode=disable
      up
    restart: on-failure

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      SERVER_PORT: "8080"
      GIN_MODE: "release"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: jambotails
      DB_PASSWORD: jambotails_secret
      DB_NAME: shipping_db
      DB_SSLMODE: disable
      DB_MAX_OPEN_CONNS: "25"
      DB_MAX_IDLE_CONNS: "10"
      DB_CONN_MAX_LIFETIME_MIN: "30"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRY_HOURS: "24"
      LOG_LEVEL: "info"

volumes:
  pgdata:
