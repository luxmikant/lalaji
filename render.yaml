# render.yaml — Render Blueprint
# Deploy this file by connecting your GitHub repo to Render and selecting "Blueprint".
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Go API backend ──────────────────────────────────────────
  - type: web
    name: jambotails-shipping-api
    runtime: go
    plan: free                # upgrade to "starter" for always-on
    buildCommand: >
      go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
      && go build -o bin/shipping-service ./cmd/server
    startCommand: sh entrypoint.sh
    healthCheckPath: /health

    envVars:
      # ── Database (Neon) ──────────────────────────────────────
      # Paste your Neon connection string in the Render dashboard
      # or link a Render Postgres service here instead.
      - key: DATABASE_URL
        sync: false           # mark as "Secret" — set manually in Dashboard

      # ── Redis ────────────────────────────────────────────────
      # Wired automatically to the redis service defined below
      - key: REDIS_URL
        fromService:
          name: jambotails-redis
          type: redis
          property: connectionString

      # ── App ──────────────────────────────────────────────────
      - key: GIN_MODE
        value: release
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false           # set to your Vercel domain, e.g. https://your-app.vercel.app
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value
      - key: JWT_EXPIRY_HOURS
        value: "24"

      # Connection pool (keep low on free tier)
      - key: DB_MAX_OPEN_CONNS
        value: "10"
      - key: DB_MAX_IDLE_CONNS
        value: "5"
      - key: DB_CONN_MAX_LIFETIME_MINUTES
        value: "5"

  # ── Redis ────────────────────────────────────────────────────
  # Free Render Redis (25 MB, auto-evicts with allkeys-lru)
  - type: redis
    name: jambotails-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []           # only allow internal Render connections
