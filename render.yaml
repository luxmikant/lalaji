# render.yaml — Render Blueprint
# Deploy this file by connecting your GitHub repo to Render and selecting "Blueprint".
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Go API backend ──────────────────────────────────────────
  - type: web
    name: jambotails-shipping-api
    runtime: go
    plan: free                # upgrade to "starter" for always-on
    buildCommand: |
      go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest &&
      go build -ldflags="-s -w" -o app ./cmd/server
    startCommand: bash entrypoint.sh
    healthCheckPath: /health

    envVars:
      # ── Database (Neon) ──────────────────────────────────────
      - key: DATABASE_URL
        sync: false           # set in Render dashboard → Secret

      # ── Redis (Upstash) ──────────────────────────────────────
      # Format: rediss://default:TOKEN@free-redbird-xxxx.upstash.io:6379
      - key: REDIS_URL
        sync: false           # set in Render dashboard → Secret

      # ── App ──────────────────────────────────────────────────
      - key: GIN_MODE
        value: release
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false           # set to your Vercel domain: https://your-app.vercel.app
      - key: JWT_SECRET
        generateValue: true   # Render generates a secure random value
      - key: JWT_EXPIRY_HOURS
        value: "24"

      # Connection pool (keep low on free tier)
      - key: DB_MAX_OPEN_CONNS
        value: "10"
      - key: DB_MAX_IDLE_CONNS
        value: "5"
      - key: DB_CONN_MAX_LIFETIME_MINUTES
        value: "5"
